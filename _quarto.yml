project:
  type: book
  output-dir: _book
  
lang: de

book:
  title: "Analoge Schaltungstechnik"
  author:
    - name: "Mirco Meiners"
      orcid: "0000-0002-9709-4191"
      email: "Mirco.Meiners@hs-bremen.de"
      corresponding: true
      roles: "Lead author"
      affiliation:
        - id: hsb
        - name: "Hochschule Bremen - City University of Applied Sciences"
          city: "Bremen"
          state: "Germany"
          url: "https://www.hs-bremen.de/person/mimeiners/"
    - name: "Tim Ziemann"
      email: "Tim.Ziemann@hs-bremen.de"
      roles: "Supporting author"
      affiliation:
        - ref: hsb
          
  date: last-modified
#  license: "Apache-2.0 license"
    
  reader-mode: true

  page-footer:
    left: |
      M 6.9 Analoge Schaltungstechnik (ANS), M. Meiners, HSB.
    right: |
      This book was built with <a href="https://quarto.org/">Quarto</a>.
#  cover-image: images/hsb-logo.png
  favicon: images/hsb-logo.png
  site-url: https://mimeiners.github.io/ans/
  repo-url: https://github.com/mimeiners/ans/
  repo-branch: main
  repo-actions: [edit,issue]
  downloads: [pdf,epub]
    
  chapters:
    - index.qmd

    - part: Seminar
      chapters:
        - lec/lec-01-intro.qmd
        # - lec/lec-18a-MCD6thEdChap10.qmd
        # - lec/lec-18b-MCD6thEdChap11.qmd
        # - lec/lec-21-MCD6thEdChap12.qmd
        # - lec/lec-22a-analog_filter_design.qmd
        # - lec/lec-23a-biquads.qmd
    
    - part: Labor
      chapters:
        - lab/Experiment_04.qmd
        - lab/Experiment_04_NR.qmd

    - references.qmd

    output-file: "ans"
    
# Bibliography
bibliography: _bibliography/references.bib
csl: _bibliography/ieee.csl


format:
  html:
    theme: flatly
    fontsize: 1.2em
    linestretch: 1.7
    # mainfont: Helvetica Neue, Helvetica, Arial, sans
    # monofont: Cascadia Mono, Menlo, Consolas, Courier New, Courier
    # backgroundcolor: "white"
    # fontcolor: "black"
    highlight-style: github

  epub:
    theme: flatly
    fontsize: 1.2em
    linestretch: 1.7
    # mainfont: Helvetica Neue, Helvetica, Arial, sans
    # monofont: Cascadia Mono, Menlo, Consolas, Courier New, Courier
    # backgroundcolor: "white"
    # fontcolor: "black"
    highlight-style: github

  pdf:
    documentclass: scrbook
    classoption: [twoside]

    keep-tex: true

    toc: true
    toc-depth: 3
    # toc-title: "Table of contents"
    # lof: true
    # lot: true

    number-sections: true
    number-depth: 2
        
    papersize: a4
        
    geometry:
      - inner=3cm
      - outer=4cm
      - top=3cm
      - bottom=4cm
      - headsep=22pt
      - headheight=11pt
      - footskip=33pt
      - ignorehead
      - ignorefoot
      - heightrounded

    fontsize: 11pt
    pdfengine: xelatex

    mainfont: "Calibri"
    # mainfont: "Times New Roman"
    # sansfont: "Arial"
    # monofont: "Courier New"
    mathfont: "TeX Gyre Termes Math"
    
    # include-in-header:
    #   - frontmatter/header.tex
    # template-partials:
    # - frontmatter/before-body.tex
    # - frontmatter/toc.tex


    
